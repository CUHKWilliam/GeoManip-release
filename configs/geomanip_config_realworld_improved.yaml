prompt_dir: &prompt_dir "vlm_query"
bounds_min: &bounds_min [-0.5, -0.75, 0.0]
bounds_min: &bounds_max [0.5, 1., 0.7]
vlm_api_key: &vlm_api_key "sk-b24ffb4725274f398d51d4aab97efe0d"
vlm_base_url: &vlm_base_url "https://dashscope.aliyuncs.com/compatible-mode/v1"
vlm_model: &vlm_model "qwen2.5-vl-72b-instruct"
llm_api_key: &llm_api_key "sk-6cf616fbddf74b7ab8e79f8f764c4957"
llm_base_url: &llm_base_url "https://api.deepseek.com"
llm_model: &llm_model "deepseek-chat"

pipeline:
  type: GeomanipPipeline
  config:
    constraint_generator:
      type: GeometricAndCodeGenerator
      config:
        prompt_dir: *prompt_dir
        cost_fns_queryer:
          type: WebQueryer
          config:
            api_key: *llm_api_key
            base_url: *llm_base_url
            model: *llm_model
            temperature: 0.8
            top_p: 0.5
        constraint_generator_queryer:
          type: WebQueryer
          config:
            api_key: *vlm_api_key
            base_url: *vlm_base_url
            model: *vlm_model
            temperature: 0.8
            top_p: 0.5
    grasper:
      type: "NaiveGrasper"
      config:
        pregrasp_approach_offset: 0.2
        grasp_approach_offset: 0.05

    perception:
      type: GeometryParserMatcher
      config:
        promt_dir: *prompt_dir
        mask_selector:
        filter_ratio: 0.1
        margin: 5
        backbone: "swin"
        database_root: "./database/"
        feature_extractor_path: "./saved_pretrained/swin_base_patch4_window12_384_22kto1k.pth"
        matcher_checkpoint_path: "./saved_pretrained/matcher_swin.pt"
        img_mean: [0.485, 0.456, 0.406]
        img_std: [0.229, 0.224, 0.225]
        img_size: 384
        

    path_solver:
      type: PathSolver
      config:
        bounds_min: *bounds_min
        bounds_max: *bounds_max
        sampling_maxfun: 5000
        max_collision_points: 60
        constraint_tolerance: 0.001
        opt_pos_step_size: 0.20
        opt_rot_step_size: 0.78
        opt_interpolate_pos_step_size: 0.02
        opt_interpolate_rot_step_size: 0.10
        interpolate_pos_step_size: 0.05
        interpolate_rot_step_size: 0.34
        minimizer_options:
          maxiter: 10
    subgoal_solver:
      type: SubgoalSolver
      config:
        bounds_min: *bounds_min
        bounds_max: *bounds_max
        sampling_maxfun: 5000
        max_collision_points: 60
        constraint_tolerance: 0.001
        opt_pos_step_size: 0.20
        opt_rot_step_size: 0.78
        opt_interpolate_pos_step_size: 0.02
        opt_interpolate_rot_step_size: 0.10
        interpolate_pos_step_size: 0.05
        interpolate_rot_step_size: 0.34
        minimizer_options:
          maxiter: 50

    visualizer:
      type: SubgoalPathVisualizer
      config:
        bounds_min: *bounds_min
        bounds_max: *bounds_max
        ply_save_path: "./debug.ply"

    environment:
      type: RealWorldEnv
      config:
        bounds_min: *bounds_min
        bounds_max: *bounds_max
        use_cache: False
        robot:
          type: UR5Robot
          config:
            UR_robot_ID: 50001
            UR_robot_port: 30002
            UR_robot_home_pose: [0, 0.5, 0.4, 3.1415, 0, 0]
            approach0: [0, 0, 1]
            binormal0: [0, 1, 0]
            eef_to_grasp_dist: 0.1
        camera:
          type: RealSense
          config:
            # Camera specific configs
            resolution: [1280, 720] # width, height
            extrinsic: [[-0.18746593, 0.51792903,-0.83462929, 0.38557143], [ 0.98110535, 0.14011352,-0.13341847, 0.49040391], [0.04784155,-0.84387068,-0.53440945, 0.38047709]]

   